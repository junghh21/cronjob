<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1976d2"/>

  <!-- Clock face (white circle) -->
  <circle cx="32" cy="32" r="22" fill="white" opacity="0.15"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- Hour markers -->
  <line x1="32" y1="14" x2="32" y2="17" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="47" x2="32" y2="50" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="32" x2="17" y2="32" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="47" y1="32" x2="50" y2="32" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Hour hand (pointing to ~10) -->
  <line x1="32" y1="32" x2="24" y2="22" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Minute hand (pointing to 12) -->
  <line x1="32" y1="32" x2="32" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="white"/>

  <!-- Refresh arrows (cron cycle indicator) -->
  <path d="M50 32 A18 18 0 0 1 32 50" fill="none" stroke="#64b5f6" stroke-width="3" stroke-linecap="round"/>
  <polygon points="32,54 28,48 36,48" fill="#64b5f6"/>
</svg>
