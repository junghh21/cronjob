# cron-manager/worker/wrangler.toml
name = 'cronjob'
main = "src/index.ts"
compatibility_date = "2024-01-01"

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "cronjob"
database_id = "0a4c1199-8aed-4d7c-bba6-16bf4af7d257"

[[kv_namespaces]]
binding = "CACHE"
id = "05b1567a49c540838a157ee82785b2b1"

# vault9 reverse-shell hub (ShellHub DO). Set the shared agent token with:
#   wrangler secret put HUB_SECRET
[[durable_objects.bindings]]
name = "SHELL_HUB"
class_name = "ShellHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ShellHub"]